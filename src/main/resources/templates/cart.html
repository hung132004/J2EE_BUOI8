<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gio hang</title>
    <style>
        :root { --text:#183153; --muted:#607792; --line:#dbe6f2; --accent:#c98513; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { min-height:100vh; font-family:Georgia,"Times New Roman",serif; color:var(--text); background:radial-gradient(circle at top left, rgba(242,169,59,.14), transparent 22%), linear-gradient(145deg,#f8fbff,#eef5fb 42%,#ffffff); padding:22px; }
        .wrap { width:min(1180px,100%); margin:0 auto; }
        .message { padding:14px 16px; border-radius:18px; margin-bottom:16px; background:#eefcf5; border:1px solid #cdeedb; color:#238858; }
        .card { border-radius:30px; border:1px solid var(--line); background:rgba(255,255,255,.94); box-shadow:0 22px 70px rgba(30,60,90,.12); overflow:hidden; }
        .head { padding:28px 30px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; gap:18px; }
        .head h1 { font-size:44px; margin-bottom:6px; }
        .head p { color:var(--muted); }
        .content { padding:24px 30px 30px; }
        .table-wrap { overflow:auto; border-radius:22px; border:1px solid #e8eff7; }
        table { width:100%; border-collapse:collapse; min-width:860px; }
        th, td { padding:18px 16px; border-bottom:1px solid #e8eff7; text-align:left; }
        th { background:#f9fbfe; text-transform:uppercase; letter-spacing:.06em; font-size:14px; color:#48617f; }
        .price, .total { color:var(--accent); font-weight:700; }
        .actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
        input[type="number"] { width:90px; padding:12px 13px; border-radius:14px; border:1px solid var(--line); background:#fff; color:var(--text); }
        .btn, .btn-secondary, .btn-danger { padding:12px 16px; border-radius:16px; border:1px solid transparent; text-decoration:none; cursor:pointer; font-weight:700; }
        .btn { background:linear-gradient(135deg,#f3ad42,#ffd587); color:#5a3a00; }
        .btn-secondary { background:#f5f8fc; border-color:var(--line); color:var(--text); }
        .btn-danger { background:#fff2f3; border-color:#f2d6da; color:#b8414d; }
        .summary { margin-top:22px; display:flex; justify-content:space-between; align-items:center; gap:16px; padding:22px; border-radius:22px; background:#f9fbfe; border:1px solid #e8eff7; }
        .summary strong { display:block; font-size:14px; color:var(--muted); margin-bottom:4px; }
        .summary span { font-size:34px; color:var(--accent); font-weight:700; }
        @media (max-width:760px) { .head, .summary { flex-direction:column; align-items:flex-start; } .content { padding-left:18px; padding-right:18px; } }
    </style>
</head>
<body>
<div class="wrap">
    <div th:if="${message}" class="message" th:text="${message}"></div>
    <div class="card">
        <div class="head">
            <div><h1>Gio hang</h1><p>So san pham trong gio: <span th:text="${cartItemCount}">0</span></p></div>
            <a th:href="@{/products}" class="btn-secondary">Quay lai mua hang</a>
        </div>
        <div class="content">
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Ten san pham</th><th>Gia</th><th>So luong</th><th>Thanh tien</th><th>Thao tac</th></tr></thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(cartItems)}"><td colspan="5">Gio hang dang rong.</td></tr>
                    <tr th:each="item : ${cartItems}">
                        <td th:text="${item.productName}"></td>
                        <td class="price" th:text="${#numbers.formatDecimal(item.price, 1, 'COMMA', 2, 'POINT')}"></td>
                        <td><form th:action="@{/cart/update}" method="post" class="actions"><input type="hidden" name="productId" th:value="${item.productId}"><input type="number" name="quantity" min="0" th:value="${item.quantity}"><button type="submit" class="btn-secondary">Cap nhat</button></form></td>
                        <td class="total" th:text="${#numbers.formatDecimal(item.amount, 1, 'COMMA', 2, 'POINT')}"></td>
                        <td><a th:href="@{/cart/remove/{id}(id=${item.productId})}" class="btn-danger">Xoa</a></td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="summary">
                <div><strong>Tong thanh toan</strong><span th:text="${#numbers.formatDecimal(totalAmount, 1, 'COMMA', 2, 'POINT')}">0</span></div>
                <form th:if="${not #lists.isEmpty(cartItems)}" th:action="@{/checkout}" method="post"><button type="submit" class="btn">Dat hang ngay</button></form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
